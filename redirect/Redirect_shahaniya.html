<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Instantly redirects the browser to Vercel (0 second delay) -->
  <meta http-equiv="refresh" content="0; url=https://shahaniyaoffers.vercel.app/" />
  <title>Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    a {
      color: #0070f3;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>We've moved!</h2>
    <p>Redirecting you to our new home: <strong>shahaniyaoffers.vercel.app</strong></p>
    <p>If you are not redirected automatically in a few seconds, <a href="https://shahaniyaoffers.vercel.app/">click here to proceed</a>.</p>
  </div>

  <script>
    // JavaScript fallback redirect if the Meta Refresh tag is blocked
    window.location.href = "https://shahaniyaoffers.vercel.app/";
  </script>
</body>
</html>
